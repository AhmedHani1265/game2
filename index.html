<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>🎮 عالمنا احنا الاتنين | ألعاب وتحديات</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Cairo', 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(145deg, #2b1a2e 0%, #1a0f1f 100%);
            min-height: 100vh;
            padding: 15px;
        }
        .container { max-width: 550px; margin: 0 auto; }
        
        /* البطاقات */
        .card {
            background: rgba(255,255,255,0.96);
            border-radius: 45px;
            padding: 25px 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        
        h2 { color: #b13e5c; text-align: center; margin-bottom: 15px; font-size: 1.6rem; }
        h3 { color: #b13e5c; margin: 15px 0 10px; font-size: 1.2rem; }
        
        /* الأزرار والتبويبات */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .tab-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            color: white;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .tab-btn.active {
            background: #ff6b8b;
            box-shadow: 0 0 15px #ff6b8b;
        }
        .tab-content {
            display: none;
            background: rgba(255,255,255,0.95);
            border-radius: 40px;
            padding: 20px;
            min-height: 500px;
        }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* الشات */
        .chat-container { display: flex; flex-direction: column; height: 380px; }
        .messages {
            flex: 1;
            overflow-y: auto;
            background: #fef0f3;
            border-radius: 25px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .message {
            margin: 8px 0;
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            word-break: break-word;
        }
        .message.me {
            background: #ff8aa1;
            color: white;
            margin-left: auto;
            text-align: right;
        }
        .message.her {
            background: #e0d6e8;
            color: #2d1b36;
        }
        .chat-input-area { display: flex; gap: 10px; }
        .chat-input-area input {
            flex: 1;
            padding: 10px;
            border: 2px solid #ffb7c5;
            border-radius: 30px;
            font-size: 0.9rem;
            font-family: inherit;
        }
        .chat-input-area button {
            background: #ff6b8b;
            border: none;
            padding: 10px 18px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        
        /* أزرار الألعاب */
        .game-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .game-btn {
            background: #ff8aa1;
            border: none;
            padding: 12px 20px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            flex: 1;
            min-width: 100px;
        }
        .game-btn.waiting {
            background: #b0a0a0;
            opacity: 0.7;
        }
        
        /* XO لعبة */
        .xo-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 300px;
            margin: 20px auto;
        }
        .xo-cell {
            aspect-ratio: 1;
            background: #ffe4ec;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            border: 2px solid #ffb7c5;
        }
        .xo-cell.x { color: #ff6b8b; }
        .xo-cell.o { color: #6b5b95; }
        
        /* لعبة الأرقام */
        .number-input {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }
        .number-input input {
            width: 80px;
            padding: 12px;
            font-size: 1.2rem;
            text-align: center;
            border: 2px solid #ffb7c5;
            border-radius: 20px;
        }
        
        /* التحديات */
        .challenge-box {
            background: #ffe4ec;
            padding: 20px;
            border-radius: 30px;
            text-align: center;
            margin: 15px 0;
        }
        .waiting-box {
            background: #fff0f3;
            padding: 30px;
            border-radius: 40px;
            text-align: center;
        }
        
        button:active { transform: scale(0.96); }
        .status-text { font-size: 0.85rem; color: #777; margin-top: 10px; }
        
        @media (max-width: 550px) {
            .tab-btn { padding: 6px 14px; font-size: 0.8rem; }
            h2 { font-size: 1.3rem; }
            .xo-cell { font-size: 2rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- شاشة تسجيل الدخول -->
    <div id="setupScreen" class="card" style="text-align: center;">
        <div style="font-size: 3rem;">💕🎮</div>
        <h2>أهلاً يا أجمل بنت في الدنيا</h2>
        <p>قولي اسمك عشان نبدأ المغامرة سوا 🤍</p>
        <input type="text" id="userName" placeholder="أكتبي اسمك..." autocomplete="off" style="padding: 12px; border-radius: 50px; border: 2px solid #ffb7c5; width: 80%; margin: 10px;">
        <br>
        <button onclick="setUserName()" style="background: #ff6b8b; padding: 12px 30px;">✨ أبدأي ✨</button>
    </div>

    <!-- اللعبة الرئيسية -->
    <div id="gameScreen" style="display: none;">
        <div class="tabs">
            <button class="tab-btn active" data-tab="chat">💬 شاتنا</button>
            <button class="tab-btn" data-tab="games">🎮 ألعابنا</button>
        </div>

        <!-- تبويب الشات -->
        <div id="chat" class="tab-content active">
            <h2>💕 نتكلم مع بعض 💕</h2>
            <div class="chat-container">
                <div class="messages" id="messages">
                    <div class="message her">✨ أهلاً يا حبيبي! أنا هنا معاك دايماً ✨</div>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" placeholder="اكتبلي يا حبيبي... 💌" onkeypress="if(event.key==='Enter') sendMessage()">
                    <button onclick="sendMessage()">إرسال ➤</button>
                </div>
            </div>
        </div>

        <!-- تبويب الألعاب -->
        <div id="games" class="tab-content">
            <h2>🎲 اختار لعبة معايا 🎲</h2>
            
            <div class="game-selector">
                <button class="game-btn" onclick="selectGame('xo')">❌⭕ XO تيك تاك تو</button>
                <button class="game-btn" onclick="selectGame('number')">🔢 تخمين الرقم</button>
                <button class="game-btn" onclick="selectGame('quick')">⚡ ترتيب سريع</button>
            </div>
            
            <div id="gameArea">
                <div class="waiting-box">
                    <div style="font-size: 2.5rem;">🎮</div>
                    <p style="margin: 15px 0;">اختاري لعبة عشان نبدأ سوا!</p>
                    <p style="color: #b13e5c;">❤️ أنا مستنيكي يا روحي ❤️</p>
                </div>
            </div>
            <div id="gameStatus" class="status-text" style="text-align: center;"></div>
        </div>
    </div>
</div>

<script>
    // 🔥 Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyCvn2CsKgRvtcGDNHv-T-y8jCQUz1KTYYI",
        authDomain: "mylovegame.firebaseapp.com",
        projectId: "mylovegame",
        storageBucket: "mylovegame.firebasestorage.app",
        messagingSenderId: "504852537460",
        appId: "1:504852537460:web:bdc7129ae84c8ea9c33121",
        databaseURL: "https://mylovegame-default-rtdb.firebaseio.com"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myName = "";
    let opponentName = "";
    let currentGame = null;      // اللعبة الحالية
    let gameReady = false;       // هل الطرفين جاهزين؟
    let myTurn = false;          // دوري أنا؟
    
    // متغيرات XO
    let xoBoard = ['', '', '', '', '', '', '', '', ''];
    let xoGameActive = false;
    
    // متغيرات تخمين الرقم
    let secretNumber = null;
    let attempts = 0;
    
    // متغيرات الترتيب السريع
    let sequence = [];
    let userSequence = [];
    
    // ========== إعداد المستخدم ==========
    function setUserName() {
        let input = document.getElementById('userName');
        let name = input.value.trim();
        if (name === "") {
            alert("اكتبي اسمك يا روحي 🤍");
            return;
        }
        myName = name;
        
        // نعرف مين التاني
        db.ref('players').set({ player1: myName, timestamp: Date.now() });
        
        document.getElementById('setupScreen').style.display = 'none';
        document.getElementById('gameScreen').style.display = 'block';
        
        listenToMessages();
        listenToGameInvites();
        updateOpponent();
    }
    
    function updateOpponent() {
        db.ref('players').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.player1 && data.player1 !== myName) {
                opponentName = data.player1;
                document.getElementById('gameStatus').innerHTML = `🌸 متصل مع: ${opponentName} 🌸`;
            } else {
                document.getElementById('gameStatus').innerHTML = `⏳ في انتظار وصول الحبيب/ة... ⏳`;
            }
        });
    }
    
    // ========== الشات ==========
    function sendMessage() {
        let input = document.getElementById('chatInput');
        let msg = input.value.trim();
        if (msg === "") return;
        
        db.ref('chat').push({
            name: myName,
            text: msg,
            time: Date.now()
        });
        input.value = '';
    }
    
    function listenToMessages() {
        db.ref('chat').on('child_added', (snapshot) => {
            let msg = snapshot.val();
            let msgDiv = document.getElementById('messages');
            let el = document.createElement('div');
            el.className = msg.name === myName ? 'message me' : 'message her';
            el.innerHTML = `<strong>${msg.name === myName ? 'أنا' : msg.name}</strong><br>${msg.text}`;
            msgDiv.appendChild(el);
            msgDiv.scrollTop = msgDiv.scrollHeight;
        });
    }
    
    // ========== نظام انتظار الطرف الآخر ==========
    function selectGame(gameType) {
        if (!opponentName) {
            alert("استنى شوية يا حبيبي، لسّه الحبيب/ة مجاش 🥺");
            return;
        }
        
        // نبعت دعوة للعبة
        db.ref('gameInvite').set({
            from: myName,
            game: gameType,
            status: 'waiting',
            timestamp: Date.now()
        });
        
        document.getElementById('gameArea').innerHTML = `
            <div class="waiting-box">
                <div style="font-size: 2rem;">⏳</div>
                <p>بعتها دعوة للعبة ${gameType === 'xo' ? 'XO' : (gameType === 'number' ? 'تخمين الرقم' : 'الترتيب السريع')}</p>
                <p>في انتظار قبول ${opponentName}...</p>
                <div style="margin-top: 15px;">💕❤️💕</div>
            </div>
        `;
        
        // نسمع للرد
        db.ref('gameInvite/status').on('value', (snapshot) => {
            const status = snapshot.val();
            if (status === 'accepted') {
                startGame(gameType);
            } else if (status === 'rejected') {
                document.getElementById('gameArea').innerHTML = `
                    <div class="waiting-box">
                        <p>😢 ${opponentName} رفض اللعبة... جربي تاني 😢</p>
                        <button onclick="selectGame('${gameType}')" style="margin-top: 15px;">أعيدي المحاولة</button>
                    </div>
                `;
            }
        }, { once: true });
    }
    
    function listenToGameInvites() {
        db.ref('gameInvite').on('value', (snapshot) => {
            const invite = snapshot.val();
            if (invite && invite.from !== myName && invite.status === 'waiting') {
                // حد بعتلي دعوة
                let gameName = invite.game === 'xo' ? 'XO' : (invite.game === 'number' ? 'تخمين الرقم' : 'الترتيب السريع');
                let accept = confirm(`${invite.from} عاوز يلعب معاك ${gameName}! توافقي؟`);
                if (accept) {
                    db.ref('gameInvite/status').set('accepted');
                    startGame(invite.game);
                } else {
                    db.ref('gameInvite/status').set('rejected');
                }
            }
        });
    }
    
    // ========== بدء اللعبة ==========
    function startGame(gameType) {
        currentGame = gameType;
        gameReady = true;
        myTurn = Math.random() < 0.5;  // اختيار عشوائي مين يبدأ
        
        if (gameType === 'xo') {
            startXOGame();
        } else if (gameType === 'number') {
            startNumberGame();
        } else if (gameType === 'quick') {
            startQuickGame();
        }
    }
    
    // ========== لعبة XO (تيك تاك تو) ==========
    function startXOGame() {
        xoBoard = ['', '', '', '', '', '', '', '', ''];
        xoGameActive = true;
        
        let boardHtml = '<div class="xo-board">';
        for (let i = 0; i < 9; i++) {
            boardHtml += `<div class="xo-cell ${xoBoard[i] === 'X' ? 'x' : (xoBoard[i] === 'O' ? 'o' : '')}" onclick="makeXOMove(${i})">${xoBoard[i]}</div>`;
        }
        boardHtml += '</div>';
        
        document.getElementById('gameArea').innerHTML = `
            <div class="challenge-box">
                <h3>❌⭕ XO - تيك تاك تو ❌⭕</h3>
                ${boardHtml}
                <p class="status-text">${myTurn ? '🎯 دورك أنت يا حبيبي 🎯' : `⏳ استنى دور ${opponentName} ⏳`}</p>
            </div>
        `;
    }
    
    window.makeXOMove = function(index) {
        if (!xoGameActive || !myTurn) {
            alert("مش دورك يا حبيبي! استنى شوية 🥺");
            return;
        }
        if (xoBoard[index] !== '') {
            alert("المكان ده مش فاضي!");
            return;
        }
        
        xoBoard[index] = 'X';
        updateXOBoard();
        
        // فحص الفوز
        let winner = checkXOWinner();
        if (winner) {
            alert("🎉 ألف مبروك! أنت كسبت اللعبة يا روحي 🎉");
            xoGameActive = false;
            return;
        }
        
        myTurn = false;
        updateXOTurn();
        
        // نبعت الحركة للتاني
        db.ref('gameMove').set({
            game: 'xo',
            move: index,
            board: xoBoard,
            turn: false
        });
    };
    
    function updateXOBoard() {
        for (let i = 0; i < 9; i++) {
            let cell = document.querySelectorAll('.xo-cell')[i];
            if (cell) {
                cell.innerHTML = xoBoard[i];
                cell.className = `xo-cell ${xoBoard[i] === 'X' ? 'x' : (xoBoard[i] === 'O' ? 'o' : '')}`;
            }
        }
    }
    
    function updateXOTurn() {
        let statusDiv = document.querySelector('#gameArea .status-text');
        if (statusDiv) {
            statusDiv.innerHTML = myTurn ? '🎯 دورك أنت يا حبيبي 🎯' : `⏳ استنى دور ${opponentName} ⏳`;
        }
    }
    
    function checkXOWinner() {
        const winPatterns = [
            [0,1,2], [3,4,5], [6,7,8],
            [0,3,6], [1,4,7], [2,5,8],
            [0,4,8], [2,4,6]
        ];
        for (let pattern of winPatterns) {
            if (xoBoard[pattern[0]] && xoBoard[pattern[0]] === xoBoard[pattern[1]] && xoBoard[pattern[0]] === xoBoard[pattern[2]]) {
                return xoBoard[pattern[0]];
            }
        }
        if (xoBoard.every(cell => cell !== '')) {
            alert("🤝 تعادل! لعبة تانية بقى 🤝");
            xoGameActive = false;
            return 'tie';
        }
        return null;
    }
    
    // استماع لحركات الخصم
    db.ref('gameMove').on('value', (snapshot) => {
        const move = snapshot.val();
        if (move && move.game === 'xo' && !myTurn && xoGameActive) {
            xoBoard = move.board;
            myTurn = true;
            updateXOBoard();
            updateXOTurn();
            
            let winner = checkXOWinner();
            if (winner && winner !== 'tie') {
                alert(`😢 ${opponentName} كسب الجولة... المرة الجاية إن شاء الله 😢`);
                xoGameActive = false;
            }
        }
    });
    
    // ========== لعبة تخمين الرقم ==========
    function startNumberGame() {
        secretNumber = Math.floor(Math.random() * 100) + 1;
        attempts = 0;
        
        document.getElementById('gameArea').innerHTML = `
            <div class="challenge-box">
                <h3>🔢 تخمين الرقم (1-100) 🔢</h3>
                <p>خمني الرقم اللي في بالي!</p>
                <div class="number-input">
                    <input type="number" id="guessInput" placeholder="رقم">
                    <button onclick="makeGuess()">خمن</button>
                </div>
                <div id="guessHint" style="margin-top: 15px;"></div>
                <p class="status-text">محاولات: ${attempts}</p>
            </div>
        `;
    }
    
    window.makeGuess = function() {
        let input = document.getElementById('guessInput');
        let guess = parseInt(input.value);
        if (isNaN(guess)) return;
        
        attempts++;
        let hint = '';
        if (guess === secretNumber) {
            hint = `🎉 صح! الرقم كان ${secretNumber} 🎉 أنت كسبتي! 🎉`;
            alert(hint);
            document.getElementById('guessHint').innerHTML = hint;
        } else if (guess < secretNumber) {
            hint = `📈 الرقم أكبر من ${guess}`;
            document.getElementById('guessHint').innerHTML = hint;
        } else {
            hint = `📉 الرقم أصغر من ${guess}`;
            document.getElementById('guessHint').innerHTML = hint;
        }
        document.querySelector('#gameArea .status-text').innerHTML = `محاولات: ${attempts}`;
        input.value = '';
    };
    
    // ========== لعبة الترتيب السريع ==========
    function startQuickGame() {
        // أرقام عشوائية للترتيب
        sequence = [5, 2, 8, 1, 9];
        userSequence = [];
        
        document.getElementById('gameArea').innerHTML = `
            <div class="challenge-box">
                <h3>⚡ رتب الأرقام تصاعدياً ⚡</h3>
                <p>الأرقام: <strong>${sequence.join(', ')}</strong></p>
                <p>رتبهم من الأصغر للأكبر:</p>
                <div class="number-input">
                    <input type="text" id="sortedInput" placeholder="مثال: 1,2,5,8,9">
                    <button onclick="checkOrder()">تأكيد</button>
                </div>
                <div id="orderResult"></div>
            </div>
        `;
    }
    
    window.checkOrder = function() {
        let input = document.getElementById('sortedInput');
        let userSorted = input.value.split(',').map(n => parseInt(n.trim()));
        let correctSorted = [...sequence].sort((a,b) => a-b);
        
        let isCorrect = JSON.stringify(userSorted) === JSON.stringify(correctSorted);
        if (isCorrect) {
            document.getElementById('orderResult').innerHTML = '🎉 صح يا عبقري! أنت كسبت اللعبة 🎉';
            alert("🎉 برافو عليكي! ذكية جداً 🎉");
        } else {
            document.getElementById('orderResult').innerHTML = `😢 للأسف... الترتيب الصح هو: ${correctSorted.join(', ')} 😢`;
        }
    };
    
    // ربط الدوال
    window.setUserName = setUserName;
    window.sendMessage = sendMessage;
    window.selectGame = selectGame;
    window.makeXOMove = makeXOMove;
    window.makeGuess = makeGuess;
    window.checkOrder = checkOrder;
    
    // التبديل بين التبويبات
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            let tabId = btn.getAttribute('data-tab');
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
        });
    });
</script>
</body>
</html>
